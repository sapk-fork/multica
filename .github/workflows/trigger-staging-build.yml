name: Trigger Staging Docker Build

on:
  push:
    branches: [features/staging]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch staging build to docker-env
        env:
          DISPATCH_TOKEN: ${{ secrets.STAGING_DISPATCH_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/sapk/multica-docker-env/dispatches \
            -d "{\"event_type\":\"staging-push\",\"client_payload\":{\"ref\":\"features/staging\",\"sha\":\"${{ github.sha }}\"}}"
